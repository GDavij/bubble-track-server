name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26"
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/bubble-track-server

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -race -count=1

  build-image:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build image
        run: docker build -t bubble-track-server:${{ github.sha }} .

      - name: Tag and push (push to main only)
        if: github.event_name != 'pull_request'
        run: |
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker tag bubble-track-server:${{ github.sha }} "$IMG:${{ github.sha }}"
          docker tag bubble-track-server:${{ github.sha }} "$IMG:latest"
          docker push "$IMG:${{ github.sha }}"
          docker push "$IMG:latest"
